slug: news
name: News Recaps
entity_label: Headline
description: |
  Tech-news recap shorts. `subtitle` holds the publication
  (e.g. "The Verge"). Uses the rss_feed plugin pointed at
  whichever outlets you follow; one headline per ingested ContentItem.

sources_config:
  - plugin_slug: rss_feed
    config:
      feeds:
        - https://www.theverge.com/rss/index.xml
        - https://techcrunch.com/feed/
      max_per_feed: 30

taxonomy:
  - ai
  - hardware
  - policy
  - apps
  - gaming
  - security
  - science
  - business

cta_fields:
  - key: article_url
    label: Full article
  - key: newsletter_url
    label: Newsletter

render_tones:
  ai: hype
  hardware: hype
  policy: dark
  apps: cozy
  gaming: hype
  security: dark
  science: cozy
  business: cozy

prompts:
  hook_system: |
    You write single-sentence TikTok/Shorts hooks for tech-news recap videos.

    A great hook stops the scroll in under 0.8 seconds. Generate exactly three
    candidates, each using a *different* emotional angle:

      curiosity   — a specific counter-intuitive detail from the story
      stake       — what changes for the viewer because of this news
      promise     — "if you follow X, you need to know this" identification

    Hard constraints (every hook):
      - ONE sentence, 14 words or fewer, no preamble, no hashtags.
      - Must cite at least ONE concrete element: a named company, a
        number, a date, a product name. No generic adjectives.

    Banned vocabulary (never emit):
      game-changing, revolutionary, disruptive, insane, mind-blowing,
      the next big thing, unprecedented.

    Return strictly via the `record_hooks` tool.

  script_system: |
    You write 45-60 second tech-news recap scripts for short-form social
    video (TikTok, YouTube Shorts, Instagram Reels).

    Use the HOOK I give you verbatim as the first line under a `## HOOK`
    header. Then structure the rest as:

      ## WHAT HAPPENED   — Bare facts: company, product, date. No spin.
      ## WHY IT MATTERS  — Why the viewer specifically should care.
      ## SOURCE          — "According to The Verge / Bloomberg / ..." one line.
      ## CTA             — "Link in bio for the full article." or similar.

    Per-section word caps (NARRATION text):
      hook ≤ 22, what_happened ≤ 30, why_it_matters ≤ 35,
      source ≤ 15, cta ≤ 10.

    Return strictly via the `record_script` tool.

  scene_prompts_system: |
    For each of the 5 script sections the user gives you, write 1-3
    Midjourney/Wanx-style image prompts that visually support that section's
    content — product shots, logo compositions, chart motifs, office
    settings. All prompts target 9:16 vertical framing.

    Return exactly 5 scenes in section order: hook, what_happened,
    why_it_matters, source, cta.

    Return strictly via the `record_scene_prompts` tool.

  meta_system: |
    Given a 45-60 second news-recap script and the news category, produce
    per-platform titles and hashtags for TikTok, YouTube Shorts, Instagram
    Reels, and Threads.

    Hashtag baselines: #technews + #techtok on TikTok, #technews on YT
    Shorts, #techreels on IG Reels.

    Return strictly via the `record_meta` tool.
