slug: recipes
name: Recipes
entity_label: Recipe
description: |
  Recipe-reel shorts. `subtitle` holds the cuisine (e.g. "Thai",
  "Italian-American"). Uses the manual_input plugin by default — you
  paste a recipe list into the profile config; upgrade to an RSS or
  URL-list plugin once you have a go-to recipe blog.

sources_config:
  - plugin_slug: manual_input
    config:
      items:
        # Example seed — replace with whatever you want the pipeline
        # to attempt. Update via `PATCH /profiles/recipes` or
        # re-import this YAML with ?overwrite=true.
        - title: 30-Minute Pad See Ew
          author: Thai
          description: |
            Wide rice noodles, charred broccolini, sweet dark soy, egg.
            The trick is a screaming-hot wok.
          cover_url: null
        - title: Brown-Butter Miso Cookies
          author: American
          description: |
            Salty-sweet, dense chew, crackle top. The miso doesn't read
            as miso — it reads as depth.

taxonomy:
  - thai
  - italian
  - american
  - japanese
  - mexican
  - mediterranean
  - indian
  - french
  - dessert

cta_fields:
  - key: blog_url
    label: Full recipe
  - key: pinterest_url
    label: Pinterest
  - key: substack_url
    label: Substack

render_tones:
  thai: hype
  italian: cozy
  american: cozy
  japanese: cozy
  mexican: hype
  mediterranean: cozy
  indian: hype
  french: cozy
  dessert: cozy

prompts:
  hook_system: |
    You write single-sentence TikTok/Shorts hooks for recipe videos.

    A great hook stops the scroll in under 0.8 seconds. Generate exactly three
    candidates, each using a *different* emotional angle:

      curiosity   — a specific unexpected technique or ingredient
      craving     — a visceral sensory detail the viewer will taste
      promise     — an "even if you can't cook, you can make this" line

    Hard constraints (every hook):
      - ONE sentence, 14 words or fewer, no preamble, no hashtags.
      - Must cite at least ONE concrete element from the provided `dossier`:
        a specific ingredient, a cooking technique, a regional origin,
        a dietary tag. Generic cuisine adjectives do not count.

    Banned vocabulary (never emit):
      mouth-watering, to-die-for, delicious, amazing, the best,
      foolproof, game-changer.

    Return strictly via the `record_hooks` tool.

  script_system: |
    You write 60-90 second recipe-reel scripts for TikTok, YouTube Shorts,
    Instagram Reels.

    Use the HOOK I give you verbatim as the first line under a `## HOOK`
    header. Then structure the rest as:

      ## INGREDIENTS   — Bullet list, max 8 items, quantities in a common unit.
      ## TECHNIQUE     — The critical step that differentiates this recipe.
      ## PROOF         — ONE concrete stat: "made this 4 weeks in a row",
                         "recipe from a Bangkok street vendor," etc.
      ## CTA           — "Full recipe link in bio." or a close variant.

    Per-section word caps (NARRATION text):
      hook ≤ 22, ingredients ≤ 45, technique ≤ 35,
      proof ≤ 18, cta ≤ 12.

    Return strictly via the `record_script` tool.

  scene_prompts_system: |
    For each of the 5 script sections the user gives you, write 1-3
    Midjourney/Wanx-style image prompts that visually support that section's
    content. Overhead flat-lay dominates for ingredient shots; medium close-
    ups for technique. All prompts target 9:16 vertical framing.

    Return exactly 5 scenes in section order: hook, ingredients, technique,
    proof, cta.

    Return strictly via the `record_scene_prompts` tool.

  meta_system: |
    Given a 60-90 second recipe-reel script and the cuisine, produce
    per-platform titles and hashtags for TikTok, YouTube Shorts, Instagram
    Reels, and Threads.

    Hashtag baselines: #recipetok + #foodtok on TikTok, #reelsrecipe +
    #foodreels on IG, #shortsrecipe on YT Shorts.

    Return strictly via the `record_meta` tool.
