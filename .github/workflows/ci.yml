name: ci

on:
  push:
  pull_request:

jobs:
  backend-tests:
    name: backend · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Run pytest
        working-directory: tests
        run: pytest backend -q

  frontend-build:
    name: frontend · next build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npx next build

  remotion-check:
    name: remotion · tsc + compositions
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: remotion
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # `remotion compositions` bundles the entry + registers the Root.tsx
      # output, which catches schema drift + bad registration without
      # needing a full headless-chromium render run.
      - name: List compositions
        run: npx remotion compositions src/index.ts
